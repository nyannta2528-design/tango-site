<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語 1500</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6aff;
    --accent2: #ff6a8a;
    --gold: #f0c060;
    --text: #e8e8f0;
    --muted: #6666888;
    --green: #50e3a4;
    --red: #ff5577;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,106,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 90% 90%, rgba(255,106,138,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--gold); }
  .header-stats {
    display: flex; gap: 20px; align-items: center;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.7rem;
    color: #aaa;
    letter-spacing: 0.05em;
  }
  .stat-chip b { color: var(--accent); }

  /* MAIN LAYOUT */
  .app {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* CONTROLS */
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .search-wrap {
    flex: 1; min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    opacity: 0.4;
  }
  select, button.ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  select:focus, button.ctrl-btn:hover { border-color: var(--accent); background: var(--card); }
  button.ctrl-btn.active { border-color: var(--accent); color: var(--accent); }

  /* MODE TABS */
  .mode-tabs {
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .mode-tab {
    flex: 1; padding: 9px 0;
    background: transparent;
    border: none; border-radius: 7px;
    color: #666;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .mode-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px rgba(124,106,255,0.4);
  }

  /* FLASHCARD MODE */
  #mode-flash { display: block; }
  #mode-list  { display: none; }
  #mode-quiz  { display: none; }

  .flash-area {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .card-counter {
    font-size: 0.75rem; color: #555;
    letter-spacing: 0.1em;
  }
  .card-counter b { color: var(--text); }

  /* FLIP CARD */
  .card-scene {
    width: 100%; max-width: 560px;
    height: 280px;
    perspective: 1200px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    gap: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .card-face.back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-color: rgba(124,106,255,0.3);
  }
  .card-face::after {
    content: '';
    position: absolute;
    inset: 0; border-radius: 18px;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
    pointer-events: none;
  }
  .card-word {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.2;
  }
  .card-phonetic {
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .card-pos {
    background: rgba(124,106,255,0.15);
    border: 1px solid rgba(124,106,255,0.3);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .card-meaning {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1.5rem;
    color: var(--gold);
    text-align: center;
  }
  .card-example {
    font-size: 0.75rem;
    color: #888;
    text-align: center;
    font-style: italic;
    line-height: 1.6;
    max-width: 400px;
  }
  .card-hint {
    position: absolute;
    bottom: 14px; right: 18px;
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.08em;
  }

  .card-nav {
    display: flex; align-items: center; gap: 16px;
    width: 100%; max-width: 560px;
    justify-content: space-between;
  }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 1.2rem;
    color: var(--text);
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--card); }
  .progress-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .card-actions {
    display: flex; gap: 10px;
    width: 100%; max-width: 560px;
    justify-content: center;
  }
  .action-btn {
    flex: 1; max-width: 160px;
    padding: 10px 0;
    border-radius: 10px;
    border: 1px solid;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .action-btn.known {
    background: rgba(80,227,164,0.1);
    border-color: rgba(80,227,164,0.4);
    color: var(--green);
  }
  .action-btn.known:hover { background: rgba(80,227,164,0.2); }
  .action-btn.unknown {
    background: rgba(255,85,119,0.1);
    border-color: rgba(255,85,119,0.4);
    color: var(--red);
  }
  .action-btn.unknown:hover { background: rgba(255,85,119,0.2); }
  .action-btn.star {
    background: rgba(240,192,96,0.1);
    border-color: rgba(240,192,96,0.4);
    color: var(--gold);
    flex: 0; width: 44px; min-width: 44px; padding: 10px;
    font-size: 1rem;
  }
  .action-btn.star:hover { background: rgba(240,192,96,0.2); }
  .action-btn.star.starred { background: rgba(240,192,96,0.25); }

  /* LIST MODE */
  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .word-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .word-card:hover { border-color: rgba(124,106,255,0.5); transform: translateY(-2px); }
  .word-card.known-card { border-left: 3px solid var(--green); }
  .word-card.unknown-card { border-left: 3px solid var(--red); }
  .wc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .wc-word {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700;
  }
  .wc-num { font-size: 0.65rem; color: #444; }
  .wc-pos {
    font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .wc-meaning {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem; color: var(--gold);
    margin-bottom: 4px;
  }
  .wc-phonetic { font-size: 0.7rem; color: #666; }

  /* QUIZ MODE */
  .quiz-area { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .quiz-q {
    width: 100%; max-width: 580px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px 28px;
    text-align: center;
    position: relative;
    transition: border-color 0.3s;
  }
  .quiz-q.correct-flash { border-color: var(--green); box-shadow: 0 0 24px rgba(80,227,164,0.2); }
  .quiz-q.wrong-flash   { border-color: var(--red);   box-shadow: 0 0 24px rgba(255,85,119,0.2); }
  .quiz-label { font-size: 0.68rem; color: #555; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; }
  .quiz-meaning {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 2rem; font-weight: 700;
    color: var(--gold);
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .quiz-pos-cat {
    font-size: 0.7rem; color: var(--accent);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 20px;
  }
  .quiz-hint {
    font-size: 0.75rem; color: #555;
    letter-spacing: 0.06em;
    min-height: 1.4em;
    transition: color 0.2s;
  }
  .quiz-hint.show { color: #888; }

  /* typing input row */
  .quiz-input-row {
    width: 100%; max-width: 580px;
    display: flex; gap: 10px; align-items: stretch;
  }
  .quiz-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.03em;
  }
  .quiz-input:focus { border-color: var(--accent); }
  .quiz-input.correct-input { border-color: var(--green); color: var(--green); background: rgba(80,227,164,0.06); }
  .quiz-input.wrong-input   { border-color: var(--red);   color: var(--red);   background: rgba(255,85,119,0.06); }
  .quiz-submit {
    background: var(--accent);
    border: none; border-radius: 12px;
    padding: 14px 22px;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .quiz-submit:hover { background: #9480ff; }
  .quiz-submit:disabled { opacity: 0.4; cursor: default; }

  /* feedback area */
  .quiz-feedback {
    width: 100%; max-width: 580px;
    min-height: 52px;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    font-size: 0.9rem;
    border-radius: 12px;
    padding: 14px 20px;
    background: transparent;
    transition: all 0.3s;
    opacity: 0;
  }
  .quiz-feedback.visible { opacity: 1; }
  .quiz-feedback.correct-fb { background: rgba(80,227,164,0.1); border: 1px solid rgba(80,227,164,0.3); color: var(--green); }
  .quiz-feedback.wrong-fb   { background: rgba(255,85,119,0.1); border: 1px solid rgba(255,85,119,0.3); color: var(--red); }
  .quiz-feedback .correct-ans {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    margin-left: 6px;
  }

  /* streak & score */
  .quiz-score {
    display: flex; gap: 24px;
    font-size: 0.8rem; color: #666;
    align-items: center;
  }
  .quiz-score .s-correct { color: var(--green); }
  .quiz-score .s-wrong   { color: var(--red); }
  .streak-badge {
    background: rgba(240,192,96,0.15);
    border: 1px solid rgba(240,192,96,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    color: var(--gold);
    display: none;
  }
  .streak-badge.show { display: inline-block; }

  /* skip/hint buttons */
  .quiz-actions {
    display: flex; gap: 10px; width: 100%; max-width: 580px; justify-content: flex-end;
  }
  .quiz-aux-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    color: #666;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .quiz-aux-btn:hover { border-color: #666; color: var(--text); }
  /* Quiz difficulty selector */
  .quiz-difficulty-row {
    display: flex; align-items: center; gap: 12px;
    width: 100%; max-width: 580px;
  }
  .quiz-diff-label {
    font-size: 0.72rem; color: #555; letter-spacing: 0.08em; white-space: nowrap;
  }
  .quiz-diff-tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .quiz-diff-tab {
    padding: 5px 14px;
    background: transparent;
    border: none; border-radius: 5px;
    color: #666;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .quiz-diff-tab:hover { color: var(--text); }
  .quiz-diff-tab.active { background: var(--accent); color: #fff; box-shadow: 0 1px 8px rgba(124,106,255,0.35); }
  .quiz-diff-tab[data-level="easy"].active  { background: var(--green);  box-shadow: 0 1px 8px rgba(80,227,164,0.35); }
  .quiz-diff-tab[data-level="mid"].active   { background: var(--gold);   box-shadow: 0 1px 8px rgba(240,192,96,0.35); color: #1a1a26; }
  .quiz-diff-tab[data-level="hard"].active  { background: var(--red);    box-shadow: 0 1px 8px rgba(255,85,119,0.35); }
  .quiz-pool-size {
    font-size: 0.68rem; color: #444; letter-spacing: 0.05em; white-space: nowrap;
  }
  .dontknow-btn { border-color: rgba(255,85,119,0.35); color: var(--red); }
  .dontknow-btn:hover { border-color: var(--red) !important; background: rgba(255,85,119,0.1); color: var(--red) !important; }
  .dontknow-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .next-btn { border-color: rgba(124,106,255,0.35); color: var(--accent); }
  .next-btn:not(:disabled):hover { border-color: var(--accent) !important; background: rgba(124,106,255,0.12); color: var(--accent) !important; }
  .next-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 28px; flex-wrap: wrap;
  }
  .page-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s; color: var(--text);
  }
  .page-btn:hover { border-color: var(--accent); }
  .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  .shuffle-btn {
    display: flex; align-items: center; gap: 6px;
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: fadeSlideUp 0.3s ease forwards; }
</style>
</head>
<body>
<header>
  <div class="logo">英単語 <span>1500</span></div>
  <div class="header-stats">
    <div class="stat-chip">覚えた: <b id="h-known">0</b></div>
    <div class="stat-chip">未習: <b id="h-unknown">0</b></div>
    <div class="stat-chip">★ <b id="h-starred">0</b></div>
  </div>
</header>

<div class="app">
  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="単語を検索...">
    </div>
    <select id="filter-cat">
      <option value="all">全カテゴリ</option>
      <option value="TOEIC">TOEIC</option>
      <option value="TOEFL">TOEFL</option>
      <option value="日常">日常</option>
      <option value="ビジネス">ビジネス</option>
      <option value="学術">学術</option>
    </select>
    <select id="filter-status">
      <option value="all">全て</option>
      <option value="known">覚えた</option>
      <option value="unknown">未習</option>
      <option value="starred">★お気に入り</option>
    </select>
    <button class="ctrl-btn shuffle-btn" onclick="shuffleWords()">⇄ シャッフル</button>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('flash')">📇 フラッシュカード</button>
    <button class="mode-tab" onclick="setMode('list')">📋 一覧</button>
    <button class="mode-tab" onclick="setMode('quiz')">🧠 クイズ</button>
  </div>

  <!-- FLASH MODE -->
  <div id="mode-flash">
    <div class="flash-area">
      <div class="card-counter">
        <b id="fc-current">1</b> / <span id="fc-total">500</span>
      </div>
      <div class="card-scene" onclick="flipCard()">
        <div class="card-inner" id="card-inner">
          <div class="card-face front">
            <div class="card-pos" id="fc-pos">noun</div>
            <div class="card-word" id="fc-word">—</div>
            <div class="card-phonetic" id="fc-phonetic">/—/</div>
            <div class="card-hint">タップして意味を確認 →</div>
          </div>
          <div class="card-face back">
            <div class="card-pos" id="fc-pos2">noun</div>
            <div class="card-meaning" id="fc-meaning">—</div>
            <div class="card-example" id="fc-example">—</div>
          </div>
        </div>
      </div>
      <div class="card-nav">
        <button class="nav-btn" onclick="prevCard()">←</button>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <button class="nav-btn" onclick="nextCard()">→</button>
      </div>
      <div class="card-actions">
        <button class="action-btn unknown" onclick="markCard(false)">✗ まだ</button>
        <button class="action-btn star" id="star-btn" onclick="toggleStar()">☆</button>
        <button class="action-btn known" onclick="markCard(true)">✓ 覚えた</button>
      </div>
    </div>
  </div>

  <!-- LIST MODE -->
  <div id="mode-list">
    <div class="word-grid" id="word-grid"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- QUIZ MODE -->
  <div id="mode-quiz">
    <div class="quiz-area">

      <!-- difficulty selector -->
      <div class="quiz-difficulty-row">
        <span class="quiz-diff-label">難易度</span>
        <div class="quiz-diff-tabs" id="quiz-diff-tabs">
          <button class="quiz-diff-tab active" data-level="all"  onclick="setDifficulty('all')">すべて</button>
          <button class="quiz-diff-tab"         data-level="easy" onclick="setDifficulty('easy')">初級</button>

//  STATE
// ============================================================
const vocab = RAW.map((r, i) => ({
  id: i,
  word: r[0], pos: r[1], meaning: r[2],
  phonetic: r[3], example: r[4], cat: r[5],
  known: false, starred: false, status: 'none'
}));

let filtered = [...vocab];
let flashIdx = 0;
let isFlipped = false;
let currentMode = 'flash';
let listPage = 0;
const PAGE_SIZE = 40;

// Quiz state
let quizCorrect = 0, quizWrong = 0, quizTotal = 0;

// Load saved state
try {
  const saved = JSON.parse(localStorage.getItem('vocab_state') || '{}');
  if (saved.states) {
    saved.states.forEach(s => {
      if (vocab[s.id]) { vocab[s.id].known = s.known; vocab[s.id].starred = s.starred; }
    });
  }
} catch(e){}

function saveState() {
  const states = vocab.filter(v => v.known || v.starred).map(v => ({id:v.id, known:v.known, starred:v.starred}));
  localStorage.setItem('vocab_state', JSON.stringify({states}));
  updateHeaderStats();
}

function updateHeaderStats() {
  document.getElementById('h-known').textContent = vocab.filter(v => v.known).length;
  document.getElementById('h-unknown').textContent = vocab.filter(v => !v.known).length;
  document.getElementById('h-starred').textContent = vocab.filter(v => v.starred).length;
}

// ============================================================
//  FILTER
// ============================================================
function applyFilter() {
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const status = document.getElementById('filter-status').value;

  filtered = vocab.filter(v => {
    if (search && !v.word.toLowerCase().includes(search) && !v.meaning.includes(search)) return false;
    if (cat !== 'all' && v.cat !== cat) return false;
    if (status === 'known' && !v.known) return false;
    if (status === 'unknown' && v.known) return false;
    if (status === 'starred' && !v.starred) return false;
    return true;
  });

  flashIdx = 0;
  listPage = 0;
  if (currentMode === 'flash') renderFlash();
  if (currentMode === 'list') renderList();
}

document.getElementById('search').addEventListener('input', applyFilter);
document.getElementById('filter-cat').addEventListener('change', applyFilter);
document.getElementById('filter-status').addEventListener('change', applyFilter);

function shuffleWords() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  flashIdx = 0;
  if (currentMode === 'flash') renderFlash();
  if (currentMode === 'list') renderList();
}

// ============================================================
//  MODE
// ============================================================
function setMode(mode) {
  currentMode = mode;
  ['flash','list','quiz'].forEach(m => {
    document.getElementById('mode-' + m).style.display = m === mode ? 'block' : 'none';
  });
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', ['flash','list','quiz'][i] === mode);
  });
  if (mode === 'list') renderList();
  if (mode === 'quiz') startQuiz();
  if (mode === 'flash') renderFlash();
}

// ============================================================
//  FLASHCARD
// ============================================================
function renderFlash() {
  if (!filtered.length) return;
  const w = filtered[flashIdx];
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('fc-word').textContent = w.word;
  document.getElementById('fc-phonetic').textContent = `/${w.phonetic}/`;
  document.getElementById('fc-pos').textContent = w.pos;
  document.getElementById('fc-pos2').textContent = w.pos;
  document.getElementById('fc-meaning').textContent = w.meaning;
  document.getElementById('fc-example').textContent = w.example;
  document.getElementById('fc-current').textContent = flashIdx + 1;
  document.getElementById('fc-total').textContent = filtered.length;
  const pct = ((flashIdx + 1) / filtered.length * 100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct + '%';
  const starBtn = document.getElementById('star-btn');
  starBtn.textContent = w.starred ? '★' : '☆';
  starBtn.classList.toggle('starred', w.starred);
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (filtered.length === 0) return;
  flashIdx = (flashIdx + 1) % filtered.length;
  renderFlash();
}

function prevCard() {
  if (filtered.length === 0) return;
  flashIdx = (flashIdx - 1 + filtered.length) % filtered.length;
  renderFlash();
}

function markCard(known) {
  if (!filtered.length) return;
  filtered[flashIdx].known = known;
  vocab[filtered[flashIdx].id].known = known;
  saveState();
  nextCard();
}

function toggleStar() {
  if (!filtered.length) return;
  const w = filtered[flashIdx];
  w.starred = !w.starred;
  vocab[w.id].starred = w.starred;
  saveState();
  renderFlash();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (currentMode !== 'flash') return;
  if (e.key === 'ArrowRight' || e.key === 'd') nextCard();
  if (e.key === 'ArrowLeft' || e.key === 'a') prevCard();
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'k') markCard(true);
  if (e.key === 'u') markCard(false);
});

// ============================================================
//  LIST
// ============================================================
function renderList() {
  const grid = document.getElementById('word-grid');
  const start = listPage * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  grid.innerHTML = '';
  page.forEach(w => {
    const d = document.createElement('div');
    d.className = 'word-card anim-in' + (w.known ? ' known-card' : '');
    d.innerHTML = `
      <div class="wc-top"><span class="wc-word">${w.word}</span><span class="wc-num">#${w.id+1}</span></div>
      <div class="wc-pos">${w.pos} · ${w.cat}</div>
      <div class="wc-meaning">${w.meaning}</div>
      <div class="wc-phonetic">/${w.phonetic}/</div>
    `;
    d.onclick = () => {
      flashIdx = filtered.indexOf(w);
      setMode('flash');
    };
    grid.appendChild(d);
  });
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const p = document.getElementById('pagination');
  p.innerHTML = '';
  if (total <= 1) return;

  const mk = (label, page, active, disabled) => {
    const b = document.createElement('button');
    b.className = 'page-btn' + (active ? ' active' : '');
    b.textContent = label;
    b.disabled = disabled;
    b.onclick = () => { listPage = page; renderList(); window.scrollTo(0,0); };
    return b;
  };
  p.appendChild(mk('«', 0, false, listPage === 0));
  p.appendChild(mk('‹', listPage-1, false, listPage === 0));
  for (let i = Math.max(0, listPage-2); i <= Math.min(total-1, listPage+2); i++) {
    p.appendChild(mk(i+1, i, i === listPage, false));
  }
  p.appendChild(mk('›', listPage+1, false, listPage >= total-1));
  p.appendChild(mk('»', total-1, false, listPage >= total-1));
}

// ============================================================
//  QUIZ (Typing Format)
// ============================================================
//  QUIZ
// ============================================================
let quizWord = null;
let quizAnswered = false;
let quizStreak = 0;
let quizHintShown = false;
let quizDifficulty = 'all'; // 'all' | 'easy' | 'mid' | 'hard'

// Difficulty bands (based on sorted index in vocab)
function getDifficultyPool() {
  const src = filtered.length > 0 ? filtered : vocab;
  const n = src.length;
  if (quizDifficulty === 'easy') return src.slice(0, Math.floor(n * 0.33));
  if (quizDifficulty === 'mid')  return src.slice(Math.floor(n * 0.33), Math.floor(n * 0.66));
  if (quizDifficulty === 'hard') return src.slice(Math.floor(n * 0.66));
  return src;
}

function setDifficulty(level) {
  quizDifficulty = level;
  document.querySelectorAll('.quiz-diff-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.level === level)
  );
  updatePoolSize();
  // Reset stats and go to next question
  startQuiz();
}

function updatePoolSize() {
  const pool = getDifficultyPool();
  document.getElementById('quiz-pool-size').textContent = `${pool.length}語`;
}

function startQuiz() {
  quizCorrect = 0; quizWrong = 0; quizTotal = 0; quizStreak = 0;
  document.getElementById('q-correct').textContent = 0;
  document.getElementById('q-wrong').textContent = 0;
  document.getElementById('q-num').textContent = 0;
  updateStreak();
  updatePoolSize();
  nextQuiz();
}

// Submit button dual role: 確認(before answer) → 次へ(after answer)
function setSubmitBtn(phase) {
  const btn = document.getElementById('quiz-submit-btn');
  if (phase === 'confirm') {
    btn.textContent = '確認 ↵';
    btn.style.background = '';
    btn.disabled = false;
  } else {
    btn.textContent = '次へ →';
    btn.style.background = 'var(--accent)';
    btn.disabled = false;
  }
}

function setAuxBtnsState(answering) {
  document.getElementById('hint-btn').disabled = !answering;
  document.getElementById('dontknow-btn').disabled = !answering;
}

function nextQuiz() {
  const pool = getDifficultyPool();
  if (pool.length === 0) return;
  quizAnswered = false;
  quizHintShown = false;
  quizWord = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById('quiz-meaning').textContent = quizWord.meaning;
  document.getElementById('quiz-pos-cat').textContent = `${quizWord.pos} · ${quizWord.cat}`;
  document.getElementById('quiz-hint').textContent = 'ヒント: —';
  document.getElementById('quiz-hint').classList.remove('show');

  const inp = document.getElementById('quiz-input');
  inp.value = '';
  inp.className = 'quiz-input';
  inp.disabled = false;
  inp.focus();

  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-feedback').innerHTML = '';
  document.getElementById('quiz-card').className = 'quiz-q';

  setSubmitBtn('confirm');
  setAuxBtnsState(true);
}

function normalizeAnswer(s) {
  return s.trim().toLowerCase().replace(/[^a-z]/g, '');
}

function showResult(correct) {
  const card = document.getElementById('quiz-card');
  const fb   = document.getElementById('quiz-feedback');
  const inp  = document.getElementById('quiz-input');
  inp.disabled = true;
  setAuxBtnsState(false);
  setSubmitBtn('next'); // ← button becomes 次へ

  if (correct) {
    inp.className = 'quiz-input correct-input';
    card.className = 'quiz-q correct-flash';
    fb.className = 'quiz-feedback correct-fb visible';
    fb.innerHTML = `✓ 正解！<span class="correct-ans">${quizWord.word}</span> &nbsp;／${quizWord.phonetic}／`;
    vocab[quizWord.id].known = true; quizWord.known = true; saveState();
  } else {
    inp.className = 'quiz-input wrong-input';
    card.className = 'quiz-q wrong-flash';
    fb.className = 'quiz-feedback wrong-fb visible';
    fb.innerHTML = `✗ 正解: <span class="correct-ans">${quizWord.word}</span> &nbsp;／${quizWord.phonetic}／`;
  }

  document.getElementById('q-correct').textContent = quizCorrect;
  document.getElementById('q-wrong').textContent   = quizWrong;
  updateStreak();
}

// Single handler for the submit/next button
function handleSubmitBtn() {
  if (!quizAnswered) submitAnswer();
  else nextQuiz();
}

function submitAnswer() {
  if (quizAnswered || !quizWord) return;
  const inp = document.getElementById('quiz-input');
  const userAns = inp.value.trim();
  if (!userAns) { inp.focus(); return; }

  quizAnswered = true;
  quizTotal++;
  document.getElementById('q-num').textContent = quizTotal;

  const correct = normalizeAnswer(userAns) === normalizeAnswer(quizWord.word);
  if (correct) { quizCorrect++; quizStreak++; }
  else         { quizWrong++;   quizStreak = 0; }

  showResult(correct);
}

function dontKnow() {
  if (quizAnswered || !quizWord) return;
  quizAnswered = true;
  quizTotal++;
  quizWrong++; quizStreak = 0;
  document.getElementById('q-num').textContent = quizTotal;
  document.getElementById('quiz-input').value = '';
  showResult(false);
}

function showHint() {
  if (!quizWord || quizAnswered) return;
  const w = quizWord.word;
  const hint = w[0] + ' _ '.repeat(w.length - 1) + ` (${w.length}文字)`;
  const el = document.getElementById('quiz-hint');
  el.textContent = 'ヒント: ' + hint;
  el.classList.add('show');
  document.getElementById('quiz-input').focus();
}

function updateStreak() {
  const el = document.getElementById('q-streak');
  if (quizStreak >= 3) {
    el.textContent = `🔥 ${quizStreak}連続`;
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

// Enter key mirrors button behavior
document.getElementById('quiz-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmitBtn();
});

// ============================================================
//  INIT
// ============================================================
renderFlash();
updateHeaderStats();
</script>
